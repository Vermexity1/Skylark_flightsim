<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Skylark Flight splash artwork</title>
  <desc id="desc">Clean aviation splash screen with angled hero panels and centered title treatment.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03111e"/>
      <stop offset="40%" stop-color="#0a3a79"/>
      <stop offset="100%" stop-color="#03101b"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35d0ff"/>
      <stop offset="55%" stop-color="#2d8fff"/>
      <stop offset="100%" stop-color="#104fb8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#8deeff" stop-opacity="0.0"/>
    </linearGradient>
    <clipPath id="panel-left-top">
      <polygon points="36,76 612,76 452,420 36,420"/>
    </clipPath>
    <clipPath id="panel-left-bottom">
      <polygon points="36,500 632,500 822,864 36,864"/>
    </clipPath>
    <clipPath id="panel-right">
      <polygon points="1004,88 1564,88 1564,864 972,864 1132,470"/>
    </clipPath>
    <clipPath id="panel-center">
      <polygon points="544,96 1076,96 1296,450 1078,804 546,804 326,450"/>
    </clipPath>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#shine)"/>

  <circle cx="1320" cy="118" r="220" fill="#79efff" opacity="0.14"/>
  <circle cx="262" cy="756" r="250" fill="#278bff" opacity="0.14"/>

  <g clip-path="url(#panel-left-top)">
    <image href="/assets/hero.jpg" x="-60" y="-12" width="820" height="520" preserveAspectRatio="xMidYMid slice"/>
    <rect width="1600" height="900" fill="#07131d" opacity="0.22"/>
  </g>

  <g clip-path="url(#panel-left-bottom)">
    <image href="/assets/hero.jpg" x="-90" y="336" width="980" height="610" preserveAspectRatio="xMidYMid slice"/>
    <rect width="1600" height="900" fill="#06111a" opacity="0.26"/>
  </g>

  <g clip-path="url(#panel-right)">
    <image href="/assets/hero.jpg" x="812" y="84" width="820" height="760" preserveAspectRatio="xMidYMid slice"/>
    <rect width="1600" height="900" fill="#071523" opacity="0.24"/>
  </g>

  <g clip-path="url(#panel-center)">
    <rect x="326" y="96" width="970" height="708" fill="url(#core)"/>
    <path d="M486 690 L1148 266" stroke="#ffffff" stroke-opacity="0.08" stroke-width="22"/>
    <path d="M402 450 H1220" stroke="#effcff" stroke-opacity="0.16" stroke-width="2"/>
    <path d="M560 308 H1070" stroke="#effcff" stroke-opacity="0.1" stroke-width="2"/>
    <path d="M560 634 H1070" stroke="#effcff" stroke-opacity="0.1" stroke-width="2"/>
  </g>

  <polygon points="36,76 612,76 452,420 36,420" fill="none" stroke="#d7fbff" stroke-opacity="0.82" stroke-width="4"/>
  <polygon points="36,500 632,500 822,864 36,864" fill="none" stroke="#d7fbff" stroke-opacity="0.82" stroke-width="4"/>
  <polygon points="1004,88 1564,88 1564,864 972,864 1132,470" fill="none" stroke="#d7fbff" stroke-opacity="0.82" stroke-width="4"/>
  <polygon points="544,96 1076,96 1296,450 1078,804 546,804 326,450" fill="none" stroke="#effcff" stroke-opacity="0.9" stroke-width="4"/>

  <text x="92" y="128" fill="#95efff" font-size="22" letter-spacing="6" font-family="Arial, Helvetica, sans-serif">SKYLARK FLIGHT</text>
  <text x="1110" y="126" fill="#a8f3ff" font-size="38" font-style="italic" font-weight="700" font-family="Arial, Helvetica, sans-serif">Aether Edition</text>
  <text x="1112" y="164" fill="#d9f8ff" font-size="18" letter-spacing="3" font-family="Arial, Helvetica, sans-serif">AVIATION CAREER AND FREE FLIGHT</text>

  <text x="812" y="266" text-anchor="middle" fill="#ecfbff" font-size="30" letter-spacing="10" font-weight="700" font-family="Arial, Helvetica, sans-serif">SKYLARK</text>
  <text x="812" y="428" text-anchor="middle" fill="#ffffff" font-size="150" font-style="italic" font-weight="900" font-family="Arial, Helvetica, sans-serif">Flight</text>
  <text x="812" y="548" text-anchor="middle" fill="#ffffff" font-size="130" font-style="italic" font-weight="900" font-family="Arial, Helvetica, sans-serif">Sim</text>
  <text x="812" y="634" text-anchor="middle" fill="#e6fbff" font-size="22" letter-spacing="5" font-family="Arial, Helvetica, sans-serif">CAREER   ONLINE RACING   FREE FLIGHT</text>
  <text x="812" y="680" text-anchor="middle" fill="#dcf8ff" font-size="18" letter-spacing="2.4" font-family="Arial, Helvetica, sans-serif">BUILD A FLEET. FLY THE WORLD. LAND WITH PRECISION.</text>
</svg>
